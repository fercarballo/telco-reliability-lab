# Enable response compression. JSON is text and compresses well (~70% reduction).
gzip on;
gzip_types application/json text/plain text/html application/javascript text/css;
gzip_min_length 256;
gzip_vary on;

# Keepalive pool to the upstream API service. Without this, nginx opens a new
# TCP connection for every proxied request. `keepalive 32` keeps up to 32 idle
# connections alive between nginx and the API container.
upstream api_backend {
    server api:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA assets.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls so the browser stays same-origin (no CORS needed).
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        # Required for upstream keepalive: Connection must not be forwarded as-is.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
