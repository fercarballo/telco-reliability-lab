# Enable response compression. JSON is text and compresses well (~70% reduction).
# Note: text/html is gzipped by nginx's default config already, so it is omitted
# here to avoid a "duplicate MIME type" warning.
gzip on;
gzip_types application/json application/javascript text/css text/plain;
gzip_min_length 256;
gzip_vary on;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so the `api` hostname is re-resolved at request
    # time instead of being pinned to a single IP at nginx startup. This keeps the
    # proxy working after `docker compose up --build` recreates the API container
    # with a new IP, and avoids nginx failing config validation when `api` is not
    # yet resolvable at boot.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Static SPA assets.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls so the browser stays same-origin (no CORS needed).
    # `$api_upstream` is a variable on purpose: it forces nginx to defer DNS
    # resolution to the resolver above (a literal proxy_pass resolves only at boot).
    location /api/ {
        set $api_upstream http://api:3000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
