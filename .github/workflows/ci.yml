name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast feedback: typecheck + unit tests + build -----------------------
  build-test:
    name: Build & unit test (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # ---- Quality gate: boot the stack and run the k6 smoke profile -----------
  performance-smoke:
    name: k6 smoke (quality gate)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Boot the stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "API healthy"; exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"; exit 1

      - name: Run k6 smoke (gates on SLO thresholds)
        run: |
          docker compose run --rm -T k6 run \
            --out 'web-dashboard=export=/scripts/reports/smoke-report.html' \
            --summary-export /scripts/reports/smoke-summary.json \
            /scripts/scenarios/smoke.js

      - name: Collect container logs
        if: always()
        run: docker compose logs --no-color > k6-stack-logs.txt 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-evidence
          path: |
            tests/k6/reports/
            k6-stack-logs.txt
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: docker compose down -v
