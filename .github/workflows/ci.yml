name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast feedback: typecheck + unit tests + build -----------------------
  build-test:
    name: Build & unit test (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # ---- OpenAPI contract lint: spec must be valid before any test runs -------
  spec-lint:
    name: OpenAPI 3.1 contract lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint docs/openapi.yaml

  # ---- Functional contract tests: API correctness + idempotency invariant ----
  api-integration:
    name: API contract & idempotency tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-test, spec-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright
        run: npm install --no-audit --no-fund

      # Build context is the repo root so the Dockerfile can reach both
      # apps/api/src and infra/postgres/init (see apps/api/Dockerfile).
      - uses: docker/setup-buildx-action@v3
      - name: Build API image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: telco-reliability-lab-api:latest
          cache-from: type=gha,scope=api-image
          cache-to: type=gha,mode=max,scope=api-image

      - name: Boot the stack
        run: docker compose up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/health >/dev/null 2>&1 && { echo "healthy"; exit 0; }
            sleep 2
          done
          echo "API did not become healthy"; exit 1

      - name: Run API integration tests
        run: npx playwright test tests/api/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: tests/api/reports/
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---- Quality gate: boot the stack and run the k6 smoke profile -----------
  performance-smoke:
    name: k6 smoke (quality gate)
    runs-on: ubuntu-latest
    needs: [build-test, spec-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - name: Build API image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: telco-reliability-lab-api:latest
          cache-from: type=gha,scope=api-image
          cache-to: type=gha,mode=max,scope=api-image

      - name: Boot the stack
        run: docker compose up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "API healthy"; exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"; exit 1

      - name: Run k6 smoke (gates on SLO thresholds)
        run: |
          docker compose run --rm -T k6 run \
            --out 'web-dashboard=export=/scripts/reports/smoke-report.html' \
            --summary-export /scripts/reports/smoke-summary.json \
            /scripts/scenarios/smoke.js

      - name: OWASP ZAP baseline scan (passive security smoke, non-blocking)
        continue-on-error: true
        run: |
          mkdir -p tests/zap
          NETWORK=$(docker inspect telco-reliability-lab-api-1 \
            --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null | head -1)
          docker run --rm \
            --network "${NETWORK:-telco-reliability-lab_default}" \
            -v "$(pwd)/tests/zap:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://api:3000 \
            -r /zap/wrk/zap-report.html \
            -J /zap/wrk/zap-report.json \
            -I -l WARN || true

      - name: Collect container logs
        if: always()
        run: docker compose logs --no-color > k6-stack-logs.txt 2>&1 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-evidence
          path: |
            tests/k6/reports/
            tests/zap/
            k6-stack-logs.txt
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: docker compose down -v
