global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: telco-reliability-lab

scrape_configs:
  - job_name: telco-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3000']
        labels:
          service: telco-api

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
