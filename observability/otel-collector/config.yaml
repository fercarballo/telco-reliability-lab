# OpenTelemetry Collector — receives OTLP from the API and forwards traces to Tempo.
# Kept deliberately simple: one traces pipeline. Metrics go straight to Prometheus
# (scrape of the API /metrics) and logs go straight to Loki (pino-loki transport),
# so the collector's only job here is traces — which is the clearest story to explain.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 2s
    send_batch_size: 512
  resource:
    attributes:
      - key: collector.name
        value: telco-otel-collector
        action: upsert

exporters:
  # Newer collectors split OTLP into otlp_grpc / otlp_http; we push to Tempo over gRPC.
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  telemetry:
    # Newer collectors replaced `metrics.address` with OTel `readers`. Bind the
    # self-metrics Prometheus endpoint to 0.0.0.0:8888 so Prometheus can scrape it.
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp_grpc/tempo, debug]
