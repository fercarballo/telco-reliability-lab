# GitLab CI — mirrors the GitHub Actions pipeline to demonstrate the same
# quality gate on a second platform (common in professional environments).

stages:
  - validate
  - build
  - test
  - performance-smoke
  - performance-diagnostic
  - report

variables:
  NODE_VERSION: "24"

# --- typecheck (fast static feedback) ---------------------------------------
validate:typecheck:
  stage: validate
  image: node:24-alpine
  cache:
    key: api-node-modules
    paths:
      - apps/api/node_modules/
  script:
    - cd apps/api
    - npm install --no-audit --no-fund
    - npm run typecheck

# --- build ------------------------------------------------------------------
build:api:
  stage: build
  image: node:24-alpine
  cache:
    key: api-node-modules
    paths:
      - apps/api/node_modules/
  script:
    - cd apps/api
    - npm install --no-audit --no-fund
    - npm run build
  artifacts:
    paths:
      - apps/api/dist/
    expire_in: 1 day

# --- unit tests -------------------------------------------------------------
test:unit:
  stage: test
  image: node:24-alpine
  cache:
    key: api-node-modules
    paths:
      - apps/api/node_modules/
  script:
    - cd apps/api
    - npm install --no-audit --no-fund
    - npm test

# --- k6 smoke quality gate (Docker-in-Docker) -------------------------------
performance:smoke:
  stage: performance-smoke
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl docker-cli-compose
  script:
    - docker compose up -d --build
    - |
      for i in $(seq 1 60); do
        if curl -fsS http://docker:3000/health >/dev/null 2>&1; then echo "API healthy"; break; fi
        sleep 2
      done
    - docker compose run --rm -T -e BASE_URL=http://api:3000 k6 run
        --out 'web-dashboard=export=/scripts/reports/smoke-report.html'
        --summary-export /scripts/reports/smoke-summary.json
        /scripts/scenarios/smoke.js
  after_script:
    - docker compose logs --no-color > k6-stack-logs.txt 2>&1 || true
    - docker compose down -v || true
  artifacts:
    when: always
    paths:
      - tests/k6/reports/
      - k6-stack-logs.txt
    expire_in: 1 week

# --- diagnostic load (stress + spike): NON-gating, scheduled or manual -------
performance:diagnostic:
  stage: performance-diagnostic
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  timeout: 75m
  # Explore limits -> must not fail the pipeline.
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
  before_script:
    - apk add --no-cache curl docker-cli-compose
  script:
    - docker compose up -d --build
    - |
      for i in $(seq 1 60); do
        curl -fsS http://docker:3000/health >/dev/null 2>&1 && break
        sleep 2
      done
    - docker compose run --rm -T k6 run -o experimental-prometheus-rw
        --out 'web-dashboard=export=/scripts/reports/stress-report.html'
        --summary-export /scripts/reports/stress-summary.json /scripts/scenarios/stress.js || true
    - docker compose run --rm -T k6 run -o experimental-prometheus-rw
        --out 'web-dashboard=export=/scripts/reports/spike-report.html'
        --summary-export /scripts/reports/spike-summary.json /scripts/scenarios/spike.js || true
  after_script:
    - docker compose down -v || true
  artifacts:
    when: always
    paths:
      - tests/k6/reports/
    expire_in: 1 week

# --- report (placeholder for executive summary generation) ------------------
report:summary:
  stage: report
  image: alpine:3.20
  needs: ["performance:smoke"]
  when: always
  script:
    - echo "k6 smoke summary available in performance:smoke artifacts (smoke-summary.json)."
